<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BioLab Store</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f2ed;
      --surface: #ffffff;
      --border: #e0ddd6;
      --text: #1a1a18;
      --muted: #7a7870;
      --accent: #1a5c3a;
      --accent-light: #e8f2ec;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .api-badge {
      font-family: var(--mono);
      font-size: 11px;
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid #b8d9c4;
      border-radius: 20px;
      padding: 3px 12px;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 2rem;
    }

    .hero {
      margin-bottom: 3rem;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .hero p {
      color: var(--muted);
      font-size: 15px;
      max-width: 480px;
      line-height: 1.7;
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .tab {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 10px 20px;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab:hover:not(.active) { color: var(--text); }

    .panel { display: none; }
    .panel.active { display: block; }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .stat {
      background: var(--surface);
      padding: 1.25rem 1.5rem;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    /* Tabla productos */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 500;
      text-align: left;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafaf8; }

    tbody td {
      padding: 14px 20px;
      font-size: 14px;
      vertical-align: middle;
    }

    .cat-pill {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 20px;
      padding: 3px 10px;
      white-space: nowrap;
    }

    .stock-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bar-bg {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      max-width: 80px;
    }

    .bar-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--accent);
    }

    .price {
      font-family: var(--mono);
      font-size: 13px;
    }

    .efic {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    /* Simulación */
    .sim-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    .sim-controls {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
    }

    .sim-controls h3 {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 1.25rem;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .field { margin-bottom: 1rem; }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-family: var(--mono);
    }

    .field select, .field input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      font-family: var(--sans);
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }

    .field select:focus, .field input:focus {
      border-color: var(--accent);
    }

    .run-btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity .15s;
    }

    .run-btn:hover { opacity: 0.85; }

    .sim-result {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .sim-empty {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .sim-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .sim-cell {
      background: var(--surface);
      padding: 1rem 1.25rem;
    }

    .growth-visual {
      margin-top: 1rem;
    }

    .growth-label {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .growth-bars {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 80px;
    }

    .g-bar {
      flex: 1;
      background: var(--accent-light);
      border-radius: 3px 3px 0 0;
      border: 1px solid #b8d9c4;
      transition: height .4s ease;
    }

    .g-bar.final {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* Ranking */
    .ranking-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }

    .rank-item {
      background: var(--surface);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .rank-num {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 500;
      color: var(--border);
      width: 32px;
      flex-shrink: 0;
    }

    .rank-num.top { color: var(--accent); }

    .rank-info { flex: 1; }
    .rank-name { font-size: 15px; font-weight: 400; margin-bottom: 2px; }
    .rank-cat { font-size: 12px; color: var(--muted); font-family: var(--mono); }

    .rank-ventas {
      text-align: right;
    }

    .rank-ventas .num {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 500;
      color: var(--accent);
    }

    .rank-ventas .lbl {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 14px;
      font-family: var(--mono);
    }

    @media (max-width: 640px) {
      .sim-layout { grid-template-columns: 1fr; }
      .hero h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">🧬 BioLab Store</span>
  <span class="api-badge">API v1.0</span>
</header>

<main>
  <div class="hero">
    <h1>Insumos de<br><em>laboratorio</em></h1>
    <p>Sistema de gestión de productos biológicos con simulación de crecimiento microbiano.</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('productos')">Productos</button>
    <button class="tab" onclick="switchTab('ranking')">Ranking</button>
    <button class="tab" onclick="switchTab('simular')">Simulación</button>
  </div>

  <!-- PRODUCTOS -->
  <div class="panel active" id="tab-productos">
    <div class="stats" id="stats-row">
      <div class="stat"><div class="stat-label">Cargando</div><div class="stat-value">—</div></div>
    </div>
    <div class="table-wrap">
      <div class="loading" id="loading-productos">Cargando productos...</div>
      <table id="tabla-productos" style="display:none">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Eficiencia</th>
          </tr>
        </thead>
        <tbody id="tbody-productos"></tbody>
      </table>
    </div>
  </div>

  <!-- RANKING -->
  <div class="panel" id="tab-ranking">
    <div class="loading" id="loading-ranking">Cargando ranking...</div>
    <div class="ranking-list" id="ranking-list" style="display:none"></div>
  </div>

  <!-- SIMULACIÓN -->
  <div class="panel" id="tab-simular">
    <div class="sim-layout">
      <div class="sim-controls">
        <h3>Parámetros</h3>
        <div class="field">
          <label>Producto</label>
          <select id="sim-producto"></select>
        </div>
        <div class="field">
          <label>Tiempo (horas)</label>
          <input type="number" id="sim-tiempo" value="24" min="1" max="200">
        </div>
        <div class="field">
          <label>Población inicial</label>
          <input type="number" id="sim-poblacion" value="100" min="1">
        </div>
        <button class="run-btn" onclick="simular()">Ejecutar simulación</button>
      </div>
      <div class="sim-result" id="sim-result">
        <div class="sim-empty">Configurá los parámetros y ejecutá la simulación.</div>
      </div>
    </div>
  </div>
</main>

<script>
  const API = 'http://127.0.0.1:5000';
  let productosData = [];

  async function fetchProductos() {
    try {
      const res = await fetch(`${API}/productos`);
      const data = await res.json();
      productosData = data;

      const categorias = [...new Set(data.map(p => p.categoria))];
      const totalStock = data.reduce((a, p) => a + p.stock, 0);
      const avgEfic = (data.reduce((a, p) => a + p.eficiencia, 0) / data.length * 100).toFixed(0);

      document.getElementById('stats-row').innerHTML = `
        <div class="stat"><div class="stat-label">Productos</div><div class="stat-value">${data.length}</div></div>
        <div class="stat"><div class="stat-label">Categorías</div><div class="stat-value">${categorias.length}</div></div>
        <div class="stat"><div class="stat-label">Stock total</div><div class="stat-value">${totalStock}</div></div>
        <div class="stat"><div class="stat-label">Efic. media</div><div class="stat-value">${avgEfic}%</div></div>
      `;

      const maxStock = Math.max(...data.map(p => p.stock));
      const tbody = document.getElementById('tbody-productos');
      tbody.innerHTML = data.map(p => `
        <tr>
          <td style="font-weight:400">${p.nombre}</td>
          <td><span class="cat-pill">${p.categoria}</span></td>
          <td class="price">$${p.precio.toFixed(2)}</td>
          <td>
            <div class="stock-bar">
              <div class="bar-bg"><div class="bar-fill" style="width:${(p.stock/maxStock*100).toFixed(0)}%"></div></div>
              <span style="font-family:var(--mono);font-size:12px">${p.stock}</span>
            </div>
          </td>
          <td class="efic">${(p.eficiencia * 100).toFixed(0)}%</td>
        </tr>
      `).join('');

      document.getElementById('loading-productos').style.display = 'none';
      document.getElementById('tabla-productos').style.display = 'table';

      const sel = document.getElementById('sim-producto');
      sel.innerHTML = data.map(p => `<option value="${p.id}">${p.nombre}</option>`).join('');

    } catch(e) {
      document.getElementById('loading-productos').textContent = 'Error conectando con la API. ¿Está corriendo python3 app.py?';
    }
  }

  async function fetchRanking() {
    try {
      const res = await fetch(`${API}/productos/top`);
      const data = await res.json();
      document.getElementById('loading-ranking').style.display = 'none';
      const list = document.getElementById('ranking-list');
      list.style.display = 'flex';
      list.innerHTML = data.map((p, i) => `
        <div class="rank-item">
          <div class="rank-num ${i < 3 ? 'top' : ''}">${String(i+1).padStart(2,'0')}</div>
          <div class="rank-info">
            <div class="rank-name">${p.nombre}</div>
            <div class="rank-cat">${p.categoria}</div>
          </div>
          <div class="rank-ventas">
            <div class="num">${p.ventas_totales}</div>
            <div class="lbl">ventas</div>
          </div>
        </div>
      `).join('');
    } catch(e) {}
  }

  async function simular() {
    const id = document.getElementById('sim-producto').value;
    const tiempo = document.getElementById('sim-tiempo').value;
    const poblacion = document.getElementById('sim-poblacion').value;
    const result = document.getElementById('sim-result');
    result.innerHTML = '<div class="sim-empty">Calculando...</div>';

    try {
      const res = await fetch(`${API}/simular?id=${id}&tiempo=${tiempo}&poblacion=${poblacion}`);
      const d = await res.json();

      const steps = 8;
      const bars = Array.from({length: steps}, (_, i) => {
        const t = (i / (steps - 1)) * Number(tiempo);
        const K = 1000000, N0 = Number(poblacion);
        const r = d.eficiencia * 0.20;
        const N = K / (1 + ((K - N0) / N0) * Math.exp(-r * t));
        return (N / K * 100).toFixed(1);
      });

      result.innerHTML = `
        <div class="sim-grid">
          <div class="sim-cell">
            <div class="stat-label">Producto</div>
            <div style="font-size:16px;font-weight:400;margin-top:4px">${d.producto}</div>
          </div>
          <div class="sim-cell">
            <div class="stat-label">Eficiencia</div>
            <div style="font-size:28px;font-weight:300;margin-top:4px">${(d.eficiencia*100).toFixed(0)}%</div>
          </div>
          <div class="sim-cell">
            <div class="stat-label">Población inicial</div>
            <div style="font-size:22px;font-weight:300;font-family:var(--mono);margin-top:4px">${Number(d.poblacion_inicial).toLocaleString()}</div>
          </div>
          <div class="sim-cell">
            <div class="stat-label">Población final (${tiempo}h)</div>
            <div style="font-size:22px;font-weight:300;font-family:var(--mono);margin-top:4px;color:var(--accent)">${Number(d.poblacion_final).toLocaleString()}</div>
          </div>
        </div>
        <div class="growth-visual">
          <div class="growth-label">Curva de crecimiento logístico</div>
          <div class="growth-bars">
            ${bars.map((h, i) => `<div class="g-bar ${i===steps-1?'final':''}" style="height:${h}%"></div>`).join('')}
          </div>
        </div>
        <div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:8px">Modelo: ${d.modelo} · N(t) = K / (1 + ((K−N₀)/N₀)·e^(−r·t))</div>
      `;
    } catch(e) {
      result.innerHTML = '<div class="sim-empty">Error al conectar con la API.</div>';
    }
  }

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['productos','ranking','simular'][i] === name));
    document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', ['productos','ranking','simular'][i] === name));
    if (name === 'ranking') fetchRanking();
  }

  fetchProductos();
</script>
</body>
</html>
